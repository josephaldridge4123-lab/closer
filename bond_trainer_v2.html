<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBB Agent Trainer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f42;
    --accent: #f5a623;
    --accent2: #e05a2b;
    --green: #2ecc71;
    --red: #e74c3c;
    --yellow: #f39c12;
    --text: #e8eaf0;
    --muted: #6b7394;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
  .tagline {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-left: 1px solid var(--border);
    padding-left: 16px;
  }
  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Layout */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 57px);
  }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 12px;
  }

  /* Mode Toggle */
  .mode-toggle {
    display: flex;
    background: var(--bg);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
    margin-bottom: 12px;
  }
  .mode-btn {
    flex: 1;
    padding: 7px 8px;
    border: none;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .mode-btn.active-green { background: var(--green); color: #000; }
  .mode-btn.active-red { background: var(--red); color: #fff; }
  .mode-btn:not(.active-green):not(.active-red):hover { color: var(--text); }

  /* Scenario List */
  .scenario-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px;
  }
  .scenario-item {
    padding: 12px 14px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 4px;
    border: 1px solid transparent;
    transition: all 0.18s;
    position: relative;
  }
  .scenario-item:hover { background: var(--surface2); border-color: var(--border); }
  .scenario-item.active { background: var(--surface2); border-color: var(--accent); }
  .scenario-item .s-name {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .scenario-item .s-charge {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }
  .scenario-item .s-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-green { background: rgba(46,204,113,0.15); color: var(--green); }
  .tag-red { background: rgba(231,76,60,0.15); color: var(--red); }
  .tag-yellow { background: rgba(243,156,18,0.15); color: var(--yellow); }
  .tag-blue { background: rgba(52,152,219,0.15); color: #3498db; }
  .risk-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  .risk-low { background: var(--green); }
  .risk-medium { background: var(--yellow); }
  .risk-high { background: var(--red); }

  /* Main Chat Area */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Brief panel */
  .brief-panel {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    gap: 24px;
    align-items: flex-start;
    flex-shrink: 0;
  }
  .brief-col { flex: 1; }
  .brief-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .brief-value {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }
  .brief-value.mono { font-family: 'DM Mono', monospace; font-size: 12px; }
  .risk-meter {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }
  .risk-bar {
    height: 4px;
    width: 20px;
    border-radius: 2px;
    background: var(--border);
  }
  .risk-bar.filled-low { background: var(--green); }
  .risk-bar.filled-med { background: var(--yellow); }
  .risk-bar.filled-high { background: var(--red); }

  /* Chat */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .chat-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    text-align: center;
    gap: 12px;
  }
  .chat-empty .icon { font-size: 48px; opacity: 0.4; }
  .chat-empty p { font-size: 14px; max-width: 280px; line-height: 1.6; }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 85%;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.agent { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    font-weight: 700;
  }
  .msg.customer .msg-avatar { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); }
  .msg.agent .msg-avatar { background: var(--accent2); color: white; }
  .msg-bubble {
    padding: 11px 15px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.55;
  }
  .msg.customer .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top-left-radius: 3px;
  }
  .msg.agent .msg-bubble {
    background: #1e3a5f;
    border: 1px solid #2a5080;
    border-top-right-radius: 3px;
  }
  .msg-time {
    font-size: 10px;
    color: var(--muted);
    margin-top: 5px;
    font-family: 'DM Mono', monospace;
  }
  .msg.agent .msg-time { text-align: right; }

  .typing-indicator {
    display: flex;
    gap: 12px;
    align-items: center;
    animation: fadeUp 0.25s ease;
  }
  .typing-dots {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-4px); opacity: 1; }
  }

  /* Input */
  .input-area {
    padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .input-wrap {
    flex: 1;
    position: relative;
  }
  .chat-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted); }
  .send-btn {
    width: 44px; height: 44px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.18s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #e09520; transform: scale(1.04); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  /* Quick actions */
  .quick-actions {
    padding: 0 24px 10px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .quick-btn {
    padding: 5px 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.18s;
    font-weight: 500;
  }
  .quick-btn:hover { color: var(--text); border-color: var(--accent); }

  /* Score overlay */
  .score-panel {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(13,15,20,0.95);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease;
    display: none;
  }
  .score-panel.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 44px;
    max-width: 520px;
    width: 90%;
    text-align: center;
  }
  .score-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .score-subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .score-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
    text-align: left;
  }
  .score-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .score-item .si-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 5px; }
  .score-item .si-val { font-size: 20px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
  .feedback-text {
    background: var(--surface2);
    border-radius: 10px;
    padding: 16px;
    font-size: 13px;
    line-height: 1.6;
    text-align: left;
    color: var(--text);
    margin-bottom: 20px;
    border-left: 3px solid var(--accent);
  }
  .score-actions { display: flex; gap: 10px; justify-content: center; }
  .btn {
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.18s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #e09520; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .get-score-btn {
    padding: 8px 18px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    flex-shrink: 0;
    height: 44px;
  }
  .get-score-btn:hover { border-color: var(--accent); color: var(--accent); }

  .placeholder-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    text-align: center;
    gap: 16px;
    padding: 40px;
  }
  .placeholder-state .big-icon { font-size: 64px; opacity: 0.2; }
  .placeholder-state h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--text);
    opacity: 0.5;
  }
  .placeholder-state p { font-size: 13px; max-width: 300px; line-height: 1.7; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .loading-spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">CBB <span>Trainer</span></div>
  <div class="tagline">Agent Role-Play Simulator</div>
  <div class="header-right">
    <div class="status-dot"></div>
    AI Live
  </div>
</div>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>Scenario Type</h3>
      <div class="mode-toggle">
        <button class="mode-btn active-green" id="btnGreen" onclick="setMode('green')">🟢 Green Bonds</button>
        <button class="mode-btn" id="btnRed" onclick="setMode('red')">🔴 Risky Bonds</button>
      </div>
    </div>
    <div class="scenario-list" id="scenarioList"></div>
  </div>

  <!-- Main -->
  <div class="main" style="position: relative;">
    <div id="placeholderState" class="placeholder-state">
      <div class="big-icon">📋</div>
      <h2>Select a Scenario</h2>
      <p>Choose a green bond (slam dunk) or risky bond from the left panel to start a live role-play with an AI caller.</p>
    </div>

    <div id="activeConvo" style="display: none; flex-direction: column; height: 100%; overflow: hidden; flex: 1;">
      <div class="brief-panel" id="briefPanel"></div>

      <div class="chat-area" id="chatArea">
        <div class="chat-empty" id="chatEmpty">
          <div class="icon">📞</div>
          <p>Hit a quick-start below or type your opening to begin the call.</p>
        </div>
      </div>

      <div class="quick-actions" id="quickActions"></div>

      <div class="input-area">
        <textarea class="chat-input" id="chatInput" placeholder="Type your response to the caller..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="get-score-btn" id="scoreBtn" onclick="requestScore()" style="display:none;">Score Session</button>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>

    <!-- Score Panel -->
    <div class="score-panel" id="scorePanel">
      <div class="score-card">
        <div class="score-title" id="scoreTitle">Session Complete</div>
        <div class="score-subtitle" id="scoreSubtitle"></div>
        <div class="score-grid" id="scoreGrid"></div>
        <div class="feedback-text" id="feedbackText"></div>
        <div class="score-actions">
          <button class="btn btn-primary" onclick="closeScore()">Continue Training</button>
          <button class="btn btn-ghost" onclick="resetConvo()">New Scenario</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SCENARIOS = {
  green: [
    {
      id: 'g1',
      name: 'Maria Johnson',
      role: 'Mother / COS',
      charge: 'DWI - Misdemeanor',
      bondAmt: '$5,000',
      riskLevel: 'low',
      tags: ['No C/H', 'Homeowner', 'Long Employment', 'Bond PIF'],
      defProfile: 'Daughter, 24 yrs old, first charge ever, lives at home, works part-time',
      cosProfile: 'Mom, 52 yrs old, homeowner 15+ yrs ($280K), works at AT&T for 22 years, no criminal history',
      situation: 'Daughter went out with friends, made a bad decision, blew .09 on breathalyzer. No accident, no injuries. Victim-less offense. First time ever in trouble.',
      systemPrompt: `You are Maria Johnson, a 52-year-old mother calling a bail bond company about your 24-year-old daughter's DWI arrest. Your daughter has never been in trouble before and you are scared but cooperative.

PERSONALITY: Worried but composed. You have steady income ($70K/yr at AT&T for 22 years), own your home, and have never dealt with the legal system. You want to get your daughter out and are willing to do whatever is needed. You answer questions honestly and fully. You ask smart questions like "how does this work?" and "what do I need to bring?"

BACKGROUND:
- Daughter: 24, works at Target part-time, lives with you, this is her first charge
- You: Own your home ($280K, 15 yrs), AT&T employee 22 years, clean criminal record
- Bond amount: $5,000 (10% = $500)
- You have $600 cash available today and can do payment plan for remainder
- Your daughter was not in an accident - she was pulled over at a checkpoint
- Daughter's BAC was .09

BEHAVIORS:
- Answer questions honestly and thoroughly
- Ask occasionally what the process looks like
- Express relief when agent sounds competent and helpful
- Willing to come in same day
- Willing to sign as sole cosigner confidently`
    },
    {
      id: 'g2',
      name: 'Robert "Bobby" Gaines',
      role: 'Father / COS',
      charge: 'Assault FV (TRO pending)',
      bondAmt: '$20,000',
      riskLevel: 'low',
      tags: ['No C/H', 'Retired Engineer', 'Homeowner $498K', 'Paid Full'],
      defProfile: 'Son, 23 yrs old, college student (final semester), lives in apartment dad pays for',
      cosProfile: 'Dad, mining engineer 25+ yrs at USLM Corporate, buying $498K home solo, no criminal history',
      situation: 'Son and girlfriend had argument that turned physical. Girlfriend not pressing charges. Son has no prior record and dad is fully engaged and already retained an attorney.',
      systemPrompt: `You are Robert Gaines, a 57-year-old mining engineer. Your son was arrested for assault family violence. You are calm, direct, and professional - you've dealt with complex problems your whole career.

PERSONALITY: Measured, businesslike, and concerned but not panicked. You trust systems and processes. You ask precise questions. You're financially stable and ready to do what it takes.

BACKGROUND:
- Son: 23, final semester at Dallas Community College for Machining Technology, you pay his $1,700/month rent
- You: Mining engineer 25+ years at USLM Corporate Lime & Minerals, buying $498K Fort Worth home for 5 yrs, NO criminal history
- Bond: $20,000. You are prepared to pay the full premium ($2,000) today
- You already retained attorney Randall Blair Isenberg
- Son's girlfriend is NOT pressing charges per the attorney

BEHAVIORS:
- Businesslike and precise when asked financial/employment questions
- Willing to pay balance in full - no hesitation
- Ask about the ETA to get son released
- Want to know what bond conditions might look like
- Say things like "what do you need from me to move this forward"`
    },
    {
      id: 'g3',
      name: 'Linda Morales',
      role: 'Mother / COS',
      charge: 'Poss CS PG2 (vape pen)',
      bondAmt: '$3,000',
      riskLevel: 'low',
      tags: ['No C/H', 'Stable POE 34yrs', 'Buying Home', 'Good Communicator'],
      defProfile: 'Daughter, 21 yrs old, bartender 3 yrs at same job, lives with mom',
      cosProfile: 'Mom, 34 yrs at same employer, buying home solo for 7+ yrs, minor charge in past (dismissed)',
      situation: 'Daughter got caught with a vape pen containing THC. Minor charge. Daughter is employed, no real prior history.',
      systemPrompt: `You are Linda Morales, a 48-year-old woman calling about your daughter's drug possession arrest (vape pen, THC). You've worked at the same company for 34 years and have been buying your home solo for 7 years.

PERSONALITY: Warm, responsible, slightly embarrassed. You are frustrated your daughter made this choice but you will support her. You are reliable and prove it through your work/home history.

BACKGROUND:
- Daughter: 21, bartender for 3 years at Knockout Sports Bar, lives with you
- You: Same employer 34 years, buying your home solo $260K for 7 years, one old dismissed charge from years ago
- Bond: $3,000. You have $400 down and can do payments biweekly on the rest
- Daughter's situation: caught with vape pen containing THC, no priors aside from this
- You will absolutely make sure she shows up to court

BEHAVIORS:
- Be slightly embarrassed but cooperative
- Explain you were great in the office (came in person, was respectful)
- Happy to add a cosigner if needed - have older sister who is also stable
- Ask about what the bond conditions should include - you want a curfew on your daughter`
    },
    {
      id: 'g4',
      name: 'David Chen',
      role: 'Father / COS',
      charge: 'DWI (son)',
      bondAmt: '$2,500',
      riskLevel: 'low',
      tags: ['Retired Tech', 'Homeowner 30yrs', 'No C/H', 'Clean'],
      defProfile: 'Son, 26, Uber Eats driver, lives at home with dad',
      cosProfile: 'Dad, retired tech consultant, owns $373K home for 30 years, no criminal history',
      situation: 'Son was driving and got pulled over. Blew above the limit. No accident, no injuries. Dad is level-headed and fully committed.',
      systemPrompt: `You are David Chen, a 62-year-old retired tech consultant calling about your son's DWI. You owned your home for 30 years and are calm and rational.

PERSONALITY: Very reasonable, almost professorial. You've lived in the same house for 30 years and have no criminal history. You're disappointed in your son but completely willing to help.

BACKGROUND:
- Son: 26, works for Uber Eats, lives with you at home
- You: Retired 2 years ago after 30 years as self-employed tech consultant, own $373K home outright, ZERO criminal history
- Bond: $2,500. You can pay it in full today no problem
- Son's BAC was above legal limit, no accident or injuries
- You found out when son's Apple Watch sent an accident alert to his mom, who went to the scene

BEHAVIORS:
- Very calm and organized
- Will pay full premium immediately
- Ask clarifying questions like "what is the court date process?"
- Say "these are good people" energy - matter of fact, no drama
- Be direct: "what do you need from me and when?"`
    }
  ],
  red: [
    {
      id: 'r1',
      name: 'Tammy Voss',
      role: 'Girlfriend / COS',
      charge: 'Agg Assault w/ Deadly Weapon',
      bondAmt: '$75,000',
      riskLevel: 'high',
      tags: ['23 Priors', '2x TDC', 'FTA History', 'DA Offering 25-Life'],
      defProfile: 'Male, 38, janitor, 23 total charges including 2 TDC stints, FTA\'d on prior bonds',
      cosProfile: 'GF of 30 years, 1 prior BF from 2010, also works as janitor at same facility, 6 months at current address',
      situation: 'Defendant shot a man at a party, fled before police arrived. DA offering 25 years to life. Def likely motivated to run.',
      systemPrompt: `You are Tammy Voss, 55, calling about your boyfriend of 30 years who was arrested for aggravated assault with a deadly weapon. He shot someone at a party. The DA is offering 25 years to life.

PERSONALITY: Evasive, gives vague answers, gets defensive when pressed. You don't fully believe he's innocent but you won't say that. You don't have stable finances or good answers to key questions.

BACKGROUND:
- Boyfriend: 38, janitor, 23 total charges, 2 TDC prison stints, FTA'd on prior bonds with other agencies
- You: GF 30 years, work as housekeeping at same facility for 1 year, one BF charge in 2010, only at current address 6 months
- Bond: $75,000. You only have $500 down
- The real situation: He shot a guy named Mitchell Sephus at a party, then RAN before police arrived
- DA is offering 25 years to life — he likely wants out to disappear

BEHAVIORS (RED FLAGS TO GIVE OFF):
- Won't give straight answers about what happened
- "I don't know all the details" constantly
- Can't explain where he'll live or how he'll get to court
- Defensive: "He didn't do nothing they're lying"
- Can't come up with any additional cosigners when asked
- Only $500 down, can't explain how to come up with more
- You're shady - agent should pick up on this`
    },
    {
      id: 'r2',
      name: 'Diane Pruett',
      role: 'Wife / COS',
      charge: 'Man Del CS PG1 (Fentanyl) - PV',
      bondAmt: '$50,000',
      riskLevel: 'high',
      tags: ['Parole Violation', 'Drug History', 'Failed to Report', '3x Missed', 'Dirty UA'],
      defProfile: 'Male, 42, on parole for 2021 felony. Had dirty UA Nov \'25, then failed to report Dec, Jan, Feb, Mar - was picked up at work',
      cosProfile: 'Wife, no crim history, works at Kohl\'s 3 years',
      situation: 'Defendant was on parole, got dirty UA for marijuana, then just stopped reporting for 4 months. Not a traditional flight risk - just someone who will inevitably go back to prison.',
      systemPrompt: `You are Diane Pruett, 39, calling about your husband who is back in jail on a parole violation. He had a dirty drug test and then simply stopped reporting to his parole officer for 4 months.

PERSONALITY: Tired. Not really surprised. You love him but you've been through this cycle before. You're not deceptive, just worn down. The real problem is he'll inevitably violate again.

BACKGROUND:
- Husband: 42, forklift driver at Lowe's Distribution (only 4 months), extensive drug history, multiple TDC stints, now violated parole
- You: No criminal history, Kohl's employee 3 years, stable but modest income
- Bond: $50,000. This is enormous - you can't do 10% plus escrow
- The real issue: He had a dirty UA for marijuana in Nov 2025, panicked, and just stopped showing up to his PO. Was picked up at work.

BEHAVIORS (RED FLAGS):
- Minimize the situation: "He just missed a few appointments"
- When asked about the dirty UA, get evasive
- Can't come up with escrow money
- When agent explains the risk of him going back to prison, get quiet
- Ask: "Can we just do payments?" — can't afford the required amount
- Note that he's only been at his current job 4 months
- Be slightly defeated — this isn't the first time`
    },
    {
      id: 'r3',
      name: 'Keisha Brown',
      role: 'Sister / COS',
      charge: 'UCW (multiple) + FTA history',
      bondAmt: '$25,000',
      riskLevel: 'high',
      tags: ['FTA History', 'Multi-County CH', 'Open Cases', 'IB History'],
      defProfile: 'Male, 29, extensive CH across Dallas/Tarrant/Travis/Smith counties, multiple BFs, 2 prior FTAs',
      cosProfile: 'Sister, self-employed grooming business $8K/mo, but 4 prior charges and 3 active judgments',
      situation: 'Defendant has extensive criminal history across 5 counties, has FTA\'d before. Sister cosigner has her own legal/financial issues.',
      systemPrompt: `You are Keisha Brown, 33, calling about your brother who was arrested for unlawful carrying of a weapon. He has a long history and has failed to appear before.

PERSONALITY: Confident and somewhat pushy. You run your own business and you're used to getting things done. But you have your own legal issues and judgments. You try to downplay your brother's history.

BACKGROUND:
- Brother: 29, 10+ charges across multiple counties including Dallas, Tarrant, Travis, Smith - has FTA'd before
- You: Own "RS Financial Grooming" for 5 years, $8K/month, but you have 4 prior charges from 2004-2020 and 3 active judgments
- Bond: $25,000. You have money but the judgments are a problem
- You want to downplay the FTAs: "He just forgot about the court date"

BEHAVIORS (RED FLAGS):
- Pushy and impatient: "Can we just move forward?"
- When asked about the FTAs, minimize: "That was a long time ago"
- When agent runs your background and finds the judgments, get defensive
- "I own my own business, I make $8K a month, the judgments are being handled"
- Try to rush the process
- Can't provide a clear answer on where your brother lives day-to-day
- Unwilling to add a second cosigner: "I'm enough"`
    },
    {
      id: 'r4',
      name: 'Carlos Gutierrez Sr.',
      role: 'Father / COS',
      charge: 'Agg Assault FV + Open UUMV',
      bondAmt: '$35,000',
      riskLevel: 'high',
      tags: ['Multiple Open Cases', 'Out-of-State FTA', 'PV History', 'Language Barrier'],
      defProfile: 'Son, 24, 15+ charges across multiple counties, PV history, also has open UUMV case in Zavala County (Eagle Pass)',
      cosProfile: 'Father, Pioneer Frozen Foods 20+ years, lead sanitizer $24/hr, Spanish-only speaker, overwhelmed',
      situation: 'Son has a laundry list of violations. Mom already said she doesn\'t trust him. Dad is nearly in tears. $35K bond and son has an open stolen vehicle case 8 hours away.',
      systemPrompt: `You are Carlos Gutierrez Sr., 52 years old, calling about your son who was arrested again. You speak mostly Spanish (respond in English but with broken/accented sentences). You are overwhelmed and nearly in tears.

PERSONALITY: Heartbroken and exhausted. You've worked at the same food processing plant for 22 years. You love your son but you're running out of hope. Your ex-wife (his mom) already refused to help.

BACKGROUND:
- Son: 24, 15+ charges, PV history, you are shocked by how much trouble he is in. Also has an open stolen vehicle case down in Zavala County (Eagle Pass, 8 hours away)
- You: Work at Pioneer Frozen Foods for 22 years as lead sanitizer, make $24/hr. Your ex-wife refused to help
- Bond: $35,000. You could do maybe $2,000 more max. You already paid some down.

BEHAVIORS (RED FLAGS):
- Shocked silence when agent explains the open warrant in Eagle Pass
- "I didn't know about the other case"
- Emotional: "I work hard, I try to give him everything..."
- Can barely come up with more money
- Can't promise son will show up to court
- When asked who else in the family can help: long pause, "I don't know... maybe nobody"
- Admits: "His mother said she doesn't trust him anymore"
- Express willingness but clear inability to manage son or payments`
    }
  ]
};

let currentMode = 'green';
let currentScenario = null;
let messages = [];
let messageCount = 0;
let isLoading = false;

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btnGreen').className = 'mode-btn' + (mode === 'green' ? ' active-green' : '');
  document.getElementById('btnRed').className = 'mode-btn' + (mode === 'red' ? ' active-red' : '');
  renderScenarios();
  resetConvo();
}

function renderScenarios() {
  const list = document.getElementById('scenarioList');
  const scenarios = SCENARIOS[currentMode];
  list.innerHTML = scenarios.map(s => `
    <div class="scenario-item ${currentScenario?.id === s.id ? 'active' : ''}" onclick="selectScenario('${s.id}')">
      <div class="risk-badge risk-${s.riskLevel}"></div>
      <div class="s-name">${s.name}</div>
      <div class="s-charge">${s.charge} · ${s.bondAmt}</div>
      <div class="s-meta">
        ${s.tags.slice(0,3).map(t => `<span class="tag ${currentMode === 'green' ? 'tag-green' : 'tag-red'}">${t}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

function selectScenario(id) {
  const all = [...SCENARIOS.green, ...SCENARIOS.red];
  currentScenario = all.find(s => s.id === id);
  messages = [];
  messageCount = 0;
  renderScenarios();
  document.getElementById('placeholderState').style.display = 'none';
  document.getElementById('activeConvo').style.display = 'flex';
  document.getElementById('scoreBtn').style.display = 'flex';
  renderBrief();
  renderChat();
  renderQuickActions();
  document.getElementById('chatInput').focus();
}

function renderBrief() {
  const s = currentScenario;
  const riskBars = s.riskLevel === 'low' 
    ? ['filled-low','filled-low','',''] 
    : s.riskLevel === 'medium' 
    ? ['filled-med','filled-med','filled-med','']
    : ['filled-high','filled-high','filled-high','filled-high'];
  
  document.getElementById('briefPanel').innerHTML = `
    <div class="brief-col">
      <div class="brief-label">Caller</div>
      <div class="brief-value"><strong>${s.name}</strong> · ${s.role}</div>
    </div>
    <div class="brief-col">
      <div class="brief-label">Charge</div>
      <div class="brief-value mono">${s.charge}</div>
    </div>
    <div class="brief-col">
      <div class="brief-label">Bond Amount</div>
      <div class="brief-value mono" style="color: var(--accent); font-size: 15px;">${s.bondAmt}</div>
    </div>
    <div class="brief-col">
      <div class="brief-label">Risk Level</div>
      <div class="risk-meter">
        ${riskBars.map(r => `<div class="risk-bar ${r}"></div>`).join('')}
      </div>
    </div>
    <div class="brief-col" style="flex:2;">
      <div class="brief-label">Situation</div>
      <div class="brief-value" style="font-size: 12px; color: var(--muted);">${s.situation}</div>
    </div>
  `;
}

function renderChat() {
  const area = document.getElementById('chatArea');
  if (messages.length === 0) {
    area.innerHTML = '<div class="chat-empty" id="chatEmpty"><div class="icon">📞</div><p>Hit a quick-start below or type your opening to begin the call.</p></div>';
    return;
  }
  area.innerHTML = messages.map(m => `
    <div class="msg ${m.role}">
      <div class="msg-avatar">${m.role === 'agent' ? 'ME' : m.avatar}</div>
      <div>
        <div class="msg-bubble">${m.text}</div>
        <div class="msg-time">${m.time}</div>
      </div>
    </div>
  `).join('');
  area.scrollTop = area.scrollHeight;
}

function renderQuickActions() {
  const btns = currentMode === 'green'
    ? ['Hi, I\'m calling about your loved one\'s bond — how can I help?', 'Can you tell me a little about the situation?', 'What is your relationship to the defendant?', 'Can I ask about your employment?']
    : ['I\'ve pulled up the case — can you walk me through what happened?', 'I\'m seeing some history on the defendant. Can you tell me about that?', 'What\'s your employment and address situation?', 'Do you have any other family who can cosign?'];
  
  document.getElementById('quickActions').innerHTML = btns.map(b => 
    `<button class="quick-btn" onclick="quickSend('${b.replace(/'/g, "\\'")}')">${b.substring(0,42)}${b.length > 42 ? '…' : ''}</button>`
  ).join('');
}

function quickSend(text) {
  document.getElementById('chatInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function nowTime() {
  return new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isLoading || !currentScenario) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  messageCount++;

  // Clear empty state
  document.getElementById('chatArea').innerHTML = '';

  messages.push({ role: 'agent', text, avatar: 'ME', time: nowTime() });
  renderMessages();
  showTyping();

  const apiMessages = buildApiMessages(text);

  try {
    const res = await fetch('/api/chatw', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: currentScenario.systemPrompt + `\n\nIMPORTANT: Stay in character as the caller at ALL times. Keep responses to 2-4 sentences max, like a real phone call. Be natural. Don't break character.`,
        messages: apiMessages
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || "Sorry, can you repeat that?";

    hideTyping();
    const initial = currentScenario.name.split(' ').map(w => w[0]).join('').substring(0,2);
    messages.push({ role: 'customer', text: reply, avatar: initial, time: nowTime() });
    renderMessages();
  } catch(e) {
    hideTyping();
    messages.push({ role: 'customer', text: "I'm sorry, I'm having trouble hearing you — can you call back?", avatar: '??', time: nowTime() });
    renderMessages();
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  if (messageCount >= 4) document.getElementById('scoreBtn').style.display = 'flex';
}

function buildApiMessages(latestText) {
  const history = messages.slice(0, -1); // exclude the one we just added
  const apiMsgs = [];
  for (const m of history) {
    apiMsgs.push({ role: m.role === 'agent' ? 'user' : 'assistant', content: m.text });
  }
  apiMsgs.push({ role: 'user', content: latestText });
  return apiMsgs;
}

function renderMessages() {
  const area = document.getElementById('chatArea');
  area.innerHTML = messages.map(m => `
    <div class="msg ${m.role}">
      <div class="msg-avatar">${m.role === 'agent' ? 'ME' : m.avatar}</div>
      <div>
        <div class="msg-bubble">${escapeHtml(m.text)}</div>
        <div class="msg-time">${m.time}</div>
      </div>
    </div>
  `).join('');
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const initial = currentScenario.name.split(' ').map(w => w[0]).join('').substring(0,2);
  area.insertAdjacentHTML('beforeend', `
    <div class="typing-indicator" id="typingIndicator">
      <div class="msg-avatar" style="background: var(--surface2); border: 1px solid var(--border); color: var(--accent); width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;">${initial}</div>
      <div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
  `);
  area.scrollTop = area.scrollHeight;
}

function hideTyping() {
  document.getElementById('typingIndicator')?.remove();
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

async function requestScore() {
  if (messages.length < 4 || isLoading) return;
  isLoading = true;

  const transcript = messages.map(m => `${m.role === 'agent' ? 'AGENT' : 'CALLER'}: ${m.text}`).join('\n');
  const isGreen = currentMode === 'green';

  try {
    const res = await fetch('/api/chatw', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a bail bond training evaluator for a DFW bail bond company. Score this agent's performance. Respond ONLY with valid JSON, no other text.`,
        messages: [{
          role: 'user',
          content: `Scenario: ${currentScenario.name} - ${currentScenario.charge} (${isGreen ? 'GREEN/Low-Risk Bond' : 'RED/High-Risk Bond'})
Def Profile: ${currentScenario.defProfile}
COS Profile: ${currentScenario.cosProfile}

TRANSCRIPT:
${transcript}

Score this agent (1-10 each) and return JSON:
{
  "rapport": number,
  "qualification": number,
  "riskAssessment": number,
  "closeability": number,
  "overallScore": number,
  "verdict": "APPROVED" | "NEEDS CONDITIONS" | "DECLINED",
  "feedback": "2-3 sentence coaching note specific to this scenario and what the agent did well or missed"
}`
        }]
      })
    });
    const data = await res.json();
    const raw = data.content?.[0]?.text || '{}';
    const clean = raw.replace(/```json|```/g,'').trim();
    const scores = JSON.parse(clean);
    showScore(scores);
  } catch(e) {
    // fallback
    showScore({
      rapport: 7, qualification: 7, riskAssessment: 7, closeability: 7, overallScore: 7,
      verdict: 'NEEDS CONDITIONS',
      feedback: 'Good effort on this scenario. Continue to probe for red flags and verify cosigner stability.'
    });
  }
  isLoading = false;
}

function showScore(s) {
  const colors = { rapport: '#3498db', qualification: '#9b59b6', riskAssessment: '#e74c3c', closeability: '#2ecc71' };
  const verdictColor = s.verdict === 'APPROVED' ? 'var(--green)' : s.verdict === 'DECLINED' ? 'var(--red)' : 'var(--yellow)';

  document.getElementById('scoreTitle').textContent = `${s.overallScore}/10 — ${s.verdict}`;
  document.getElementById('scoreTitle').style.color = verdictColor;
  document.getElementById('scoreSubtitle').textContent = `${currentScenario.name} · ${currentScenario.charge}`;
  document.getElementById('scoreGrid').innerHTML = [
    ['Rapport', s.rapport, colors.rapport],
    ['Qualification', s.qualification, colors.qualification],
    ['Risk Assessment', s.riskAssessment, colors.riskAssessment],
    ['Closeability', s.closeability, colors.closeability]
  ].map(([label, val, color]) => `
    <div class="score-item">
      <div class="si-label">${label}</div>
      <div class="si-val" style="color: ${color};">${val}/10</div>
    </div>
  `).join('');
  document.getElementById('feedbackText').textContent = s.feedback;
  document.getElementById('scorePanel').classList.add('show');
}

function closeScore() {
  document.getElementById('scorePanel').classList.remove('show');
}

function resetConvo() {
  currentScenario = null;
  messages = [];
  messageCount = 0;
  document.getElementById('placeholderState').style.display = 'flex';
  document.getElementById('activeConvo').style.display = 'none';
  document.getElementById('scorePanel').classList.remove('show');
  renderScenarios();
}

// Init
renderScenarios();
</script>
</body>
</html>
